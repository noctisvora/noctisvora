<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noctisvora Admin Login</title>

<style>

body{
    background:#060606;
    color:white;
    font-family:Poppins,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.login-box{
    width:350px;

    background:#111;

    border:1px solid rgba(255,255,255,0.08);

    padding:40px;

    border-radius:25px;
}

h1{
    margin-bottom:25px;
    text-align:center;
}

input{
    width:100%;

    padding:15px;

    margin-bottom:18px;

    border:none;

    border-radius:15px;

    background:#1b1b1b;

    color:white;

    outline:none;
}

button{
    width:100%;

    padding:15px;

    border:none;

    border-radius:50px;

    background:#2a2a2a;

    color:white;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#3a3a3a;
}

</style>

</head>

<body>

<div class="login-box">

    <h1>🔐 Admin Login</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<script>

function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(
        username === "admin"
        &&
        password === "noctisvora123"
    ){

        localStorage.setItem("adminLoggedIn","true");

        window.location.href = "admin.html";

    }else{

        alert("Wrong Credentials");

    }

}

</script>

</body>
</html>
